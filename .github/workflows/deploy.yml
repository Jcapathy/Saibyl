name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
      - name: Backend tests
        run: cd backend && uv sync --dev && uv run ruff check . && uv run pytest --tb=short
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Frontend checks
        run: cd frontend && npm ci && npx tsc --noEmit

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy Backend
        run: curl -sS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
      - name: Deploy Worker
        run: curl -sS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WORKER }}"
      - name: Deploy Frontend
        run: curl -sS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
