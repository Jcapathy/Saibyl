services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - ENVIRONMENT=production
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: ./backend
    env_file: .env
    environment:
      - ENVIRONMENT=production
    depends_on:
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  redis-data:
