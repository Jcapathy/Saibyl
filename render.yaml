services:
  # ── Backend API (FastAPI + Uvicorn) ──────────────────────────────
  - type: web
    name: saibyl-backend
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ZEP_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID_STARTER
        sync: false
      - key: STRIPE_PRICE_ID_PRO
        sync: false
      - key: STRIPE_PRICE_ID_ENTERPRISE
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: LLM_PROVIDER
        value: anthropic
      - key: LLM_MODEL
        value: claude-opus-4-6
      - key: LLM_FAST_MODEL
        value: claude-haiku-4-5-20251001
      - key: SUPABASE_STORAGE_BUCKET
        value: saibyl-uploads
      - key: SIMULATION_MAX_ROUNDS
        value: "10"
      - key: SIMULATION_WORKER_CONCURRENCY
        value: "4"
      - key: FRONTEND_URL
        value: https://saibyl-frontend.onrender.com
      - key: BACKEND_URL
        value: https://saibyl-backend.onrender.com
      - key: CORS_ORIGINS
        value: https://saibyl-frontend.onrender.com
      - key: REDIS_URL
        fromService:
          name: saibyl-redis
          type: redis
          property: connectionString

  # ── Frontend (React SPA on Render Static) ───────────────────────
  - type: web
    name: saibyl-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    envVars:
      - key: VITE_API_URL
        value: https://saibyl-backend.onrender.com/api
      - key: VITE_WS_URL
        value: wss://saibyl-backend.onrender.com

  # ── Redis (pub/sub for real-time WebSocket updates) ─────────────
  - type: redis
    name: saibyl-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
